function LiquidityView({ wallet, balances, refreshBalances }) {
  const liveStocks = STOCKS.filter(s => s.live && s.token);
  const [vaultBalances, setVaultBalances] = useState({});
  const [lpDeposits, setLpDeposits] = useState({});
  const [amounts, setAmounts] = useState({});
  const [busy, setBusy] = useState(false);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(true);

  const loadVaultData = async () => {
    setLoading(true);
    try {
      const provider = wallet ? wallet.provider : new ethers.JsonRpcProvider('https://rpc.testnet.chain.robinhood.com');
      const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, provider);
      const vBals = {};
      const lpDeps = {};
      for (const s of liveStocks) {
        const bal = await vault.getVaultBalance(s.token);
        const token = new ethers.Contract(s.token, ERC20_ABI, provider);
        const dec = await token.decimals();
        vBals[s.ticker] = parseFloat(ethers.formatUnits(bal, dec));
        if (wallet) {
          const dep = await vault.lpTokenDeposits(wallet.address, s.token);
          lpDeps[s.ticker] = parseFloat(ethers.formatUnits(dep, dec));
        }
      }
      setVaultBalances(vBals);
      setLpDeposits(lpDeps);
    } catch (err) { console.warn('Vault data error:', err); }
    setLoading(false);
  };

  useEffect(() => { loadVaultData(); }, [wallet]);

  const handleDeposit = async (stock) => {
    if (!wallet) { alert('Connect wallet first'); return; }
    const amt = amounts[stock.ticker];
    if (!amt || parseFloat(amt) <= 0) return;
    setBusy(true); setResult(null);
    try {
      const token = new ethers.Contract(stock.token, ERC20_ABI, wallet.signer);
      const dec = await token.decimals();
      const amount = ethers.parseUnits(amt, dec);
      // Approve
      setResult({ ok: true, msg: `Approving ${stock.ticker}...` });
      const approveTx = await token.approve(VAULT_ADDRESS, amount);
      await approveTx.wait();
      // Deposit
      setResult({ ok: true, msg: `Depositing ${amt} ${stock.ticker} into vault...` });
      const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
      const tx = await vault.deposit(stock.token, amount);
      await tx.wait();
      setResult({ ok: true, msg: `Deposited ${amt} ${stock.ticker} into AtlasVault!` });
      await loadVaultData();
      if (refreshBalances) refreshBalances();
    } catch (err) { setResult({ ok: false, msg: err.reason || err.message }); }
    setBusy(false);
  };

  const handleWithdraw = async (stock) => {
    if (!wallet) { alert('Connect wallet first'); return; }
    const amt = amounts[stock.ticker];
    if (!amt || parseFloat(amt) <= 0) return;
    setBusy(true); setResult(null);
    try {
      const token = new ethers.Contract(stock.token, ERC20_ABI, wallet.signer);
      const dec = await token.decimals();
      const amount = ethers.parseUnits(amt, dec);
      setResult({ ok: true, msg: `Withdrawing ${amt} ${stock.ticker} from vault...` });
      const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
      const tx = await vault.withdraw(stock.token, amount);
      await tx.wait();
      setResult({ ok: true, msg: `Withdrawn ${amt} ${stock.ticker} from AtlasVault!` });
      await loadVaultData();
      if (refreshBalances) refreshBalances();
    } catch (err) { setResult({ ok: false, msg: err.reason || err.message }); }
    setBusy(false);
  };

  const totalVaultValue = liveStocks.reduce((s, st) => s + (vaultBalances[st.ticker] || 0) * st.price, 0);
  const totalLPValue = liveStocks.reduce((s, st) => s + (lpDeposits[st.ticker] || 0) * st.price, 0);

  return <>
    <div className="crumbs"><div className="path">Dashboard / <b>Provide Liquidity</b></div></div>
    <div className="sec-title" style={{marginTop:18}}>
      <h2>Liquidity Providers</h2>
      <span className="ornament">&#10022; &#10022; &#10022;</span>
    </div>
    <p style={{fontFamily:'var(--sans)', fontSize:14, color:'var(--ink-soft)', lineHeight:1.7, maxWidth:640, marginBottom:8}}>
      Deposit your tokenized stocks into the AtlasVault to provide liquidity for index buyers.
      When someone buys an index, the vault supplies the underlying stocks automatically.
    </p>
    <p style={{fontFamily:'var(--sans)', fontSize:14, color:'var(--ink-soft)', lineHeight:1.7, maxWidth:640, marginBottom:24}}>
      As a liquidity provider, you earn <b style={{color:'var(--green)'}}>50% of all creator fees</b> generated by index token purchases.
      The more you deposit, the more you earn.
    </p>

    <section className="stats">
      <div className="stat">
        <div className="stat-label">Vault TVL</div>
        <div className="stat-value">${totalVaultValue.toFixed(0)}<span className="unit">USD</span></div>
        <div className="stat-foot">Total vault value at market price</div>
      </div>
      <div className="stat">
        <div className="stat-label">Your Deposits</div>
        <div className="stat-value">${totalLPValue.toFixed(0)}<span className="unit">USD</span></div>
        <div className="stat-foot">{wallet ? 'Your share of the vault' : 'Connect wallet to see'}</div>
      </div>
      <div className="stat">
        <div className="stat-label">LP Fee Share</div>
        <div className="stat-value">50<span className="unit">%</span></div>
        <div className="stat-foot">Of index creator fees</div>
      </div>
      <div className="stat">
        <div className="stat-label">Active Indices</div>
        <div className="stat-value">{DEPLOYED_INDICES.length}</div>
        <div className="stat-foot">Generating fees for LPs</div>
      </div>
    </section>

    <div className="sec-title" style={{marginTop:32}}>
      <span className="kicker">Vault Holdings</span>
      <h2>Deposit / Withdraw</h2>
    </div>

    <table className="indices">
      <thead><tr><th>Stock</th><th>Price</th><th>Vault Balance</th><th>Your Deposit</th><th>Your Wallet</th><th>Amount</th><th>Actions</th></tr></thead>
      <tbody>
        {liveStocks.map(s => <tr key={s.ticker}>
          <td style={{fontFamily:'var(--mono)', fontSize:13, fontWeight:600, color:'var(--blue)'}}>{s.ticker}</td>
          <td style={{fontFamily:'var(--mono)', fontFeatureSettings:'"tnum"'}}>${s.price.toFixed(2)}</td>
          <td style={{fontFamily:'var(--mono)', fontFeatureSettings:'"tnum"', fontWeight:600}}>{loading ? '...' : (vaultBalances[s.ticker] || 0).toFixed(2)}</td>
          <td style={{fontFamily:'var(--mono)', fontFeatureSettings:'"tnum"', color:'var(--green)'}}>{loading ? '...' : (lpDeposits[s.ticker] || 0).toFixed(2)}</td>
          <td style={{fontFamily:'var(--mono)', fontFeatureSettings:'"tnum"'}}>{(balances[s.ticker] || 0).toFixed(2)}</td>
          <td>
            <input
              value={amounts[s.ticker] || ''}
              onChange={e => setAmounts(prev => ({...prev, [s.ticker]: e.target.value}))}
              placeholder="0.0"
              style={{width:70, padding:'5px 8px', border:'1px solid var(--ink)', fontFamily:'var(--mono)', fontSize:12, background:'var(--paper)'}}
            />
          </td>
          <td style={{display:'flex', gap:4}}>
            <button className="btn primary" style={{fontSize:10, padding:'4px 12px'}} onClick={() => handleDeposit(s)} disabled={busy}>Deposit</button>
            <button className="btn" style={{fontSize:10, padding:'4px 12px'}} onClick={() => handleWithdraw(s)} disabled={busy}>Withdraw</button>
          </td>
        </tr>)}
      </tbody>
    </table>

    {result && <div style={{marginTop:12, padding:'10px 14px', fontFamily:'var(--mono)', fontSize:11, border:'1px solid', borderColor: result.ok ? 'var(--green)' : 'var(--red)', color: result.ok ? 'var(--green)' : 'var(--red)', background: result.ok ? 'rgba(0,180,0,.05)' : 'rgba(180,0,0,.05)'}}>{result.msg}</div>}

    <div style={{marginTop:28, padding:20, border:'1px solid var(--rule)', background:'rgba(94,121,178,.03)', clipPath:'polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%)'}}>
      <div style={{fontFamily:'var(--display)', fontSize:16, fontWeight:700, letterSpacing:'.04em', marginBottom:10}}>How it works</div>
      <div style={{fontFamily:'var(--sans)', fontSize:13, color:'var(--ink-soft)', lineHeight:1.8}}>
        <div><b>1.</b> Deposit your stock tokens into the AtlasVault</div>
        <div><b>2.</b> When someone buys an index, the vault provides the stocks automatically</div>
        <div><b>3.</b> Index creators earn a fee on each purchase (set when creating the index)</div>
        <div><b>4.</b> 50% of that fee is distributed to LPs proportional to their deposits</div>
        <div><b>5.</b> Withdraw your stocks anytime (subject to available vault liquidity)</div>
      </div>
      <div style={{marginTop:14, fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-mute)'}}>
        AtlasVault: <a href={'https://explorer.testnet.chain.robinhood.com/address/' + VAULT_ADDRESS} target="_blank" style={{color:'var(--blue)'}}>{VAULT_ADDRESS}</a>
      </div>
    </div>
  </>;
}

function CreateIndexView({ setView, wallet }) {
  const liveStocks = STOCKS.filter(s => s.live && s.token);
  const [idxName, setIdxName] = useState('');
  const [idxSymbol, setIdxSymbol] = useState('');
  const [selected, setSelected] = useState([]);
  const [feePct, setFeePct] = useState('0.3');
  const [deploying, setDeploying] = useState(false);
  const [result, setResult] = useState(null);
  const labelStyle = {fontFamily:'var(--mono)', fontSize:10, letterSpacing:'.28em', textTransform:'uppercase', color:'var(--ink-soft)', display:'block', marginBottom:8};
  const inputStyle = {width:'100%', padding:'10px 14px', border:'1px solid var(--ink)', background:'var(--paper)', fontFamily:'var(--display)', fontSize:18, letterSpacing:'.06em', color:'var(--ink)', outline:'none'};

  const toggleStock = (ticker) => {
    setSelected(prev => prev.includes(ticker) ? prev.filter(t => t !== ticker) : prev.length < 5 ? [...prev, ticker] : prev);
  };

  const deploy = async () => {
    if (!wallet) { alert('Connect your wallet first'); return; }
    if (!idxName || !idxSymbol || selected.length < 2) { alert('Fill name, symbol, and select 2-5 stocks'); return; }
    setDeploying(true);
    try {
      const stockAddrs = selected.map(t => STOCKS.find(s => s.ticker === t).token);
      const equalWeight = Math.floor(10000 / selected.length);
      const weightArr = selected.map((_, i) => i === 0 ? 10000 - equalWeight * (selected.length - 1) : equalWeight);
      const feeBps = Math.round(parseFloat(feePct) * 100);
      const factory = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, wallet.signer);
      const tx = await factory.createIndex(idxName, idxSymbol.toUpperCase(), stockAddrs, weightArr, feeBps);
      setResult({ status: 'pending', tx: tx.hash });
      const receipt = await tx.wait();
      // Get index address from event
      const event = receipt.logs.find(l => {
        try { return factory.interface.parseLog(l)?.name === 'IndexCreated'; } catch { return false; }
      });
      const indexAddr = event ? factory.interface.parseLog(event).args[0] : 'Check explorer';
      // Reload indices
      await loadDeployedIndices(wallet.provider);
      setResult({ status: 'success', tx: tx.hash, address: indexAddr });
    } catch (err) {
      setResult({ status: 'error', message: err.reason || err.message });
    }
    setDeploying(false);
  };

  return <>
    <div className="crumbs"><div className="path">Dashboard / <b>Create Index</b></div></div>
    <div className="sec-title" style={{marginTop:18}}><h2>Create New Index</h2><span className="ornament">&#10022; &#10022; &#10022;</span></div>
    <p style={{fontFamily:'var(--sans)', fontSize:14, color:'var(--ink-soft)', lineHeight:1.6, maxWidth:600, marginBottom:24}}>
      Deploy a real ERC-20 index token on Robinhood Chain. Select 2-5 stocks, set your fee, and deploy.
    </p>
    <div style={{border:'1px solid var(--ink)', padding:28, maxWidth:620, background:'var(--paper)', clipPath:'polygon(0 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%)'}}>
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:20}}>
        <div>
          <label style={labelStyle}>Index Name</label>
          <input style={inputStyle} placeholder="e.g. Tech Titans" value={idxName} onChange={e => setIdxName(e.target.value)} />
        </div>
        <div>
          <label style={labelStyle}>Ticker Symbol</label>
          <input style={{...inputStyle, fontFamily:'var(--mono)'}} placeholder="e.g. TECH" value={idxSymbol} onChange={e => setIdxSymbol(e.target.value.toUpperCase().replace(/[^A-Z]/g,'').slice(0,5))} />
        </div>
      </div>
      <div style={{marginBottom:20}}>
        <label style={labelStyle}>Select Stocks (2-5) {selected.length > 0 && `· ${selected.length} selected`}</label>
        <div style={{display:'grid', gridTemplateColumns:'repeat(5, 1fr)', gap:8}}>
          {liveStocks.map(s => {
            const active = selected.includes(s.ticker);
            return <div key={s.ticker} onClick={() => toggleStock(s.ticker)} style={{
              border: active ? '2px solid var(--ink)' : '1px solid var(--rule)',
              padding:'12px 8px', textAlign:'center', cursor:'pointer', transition:'all .15s',
              background: active ? 'rgba(94,121,178,.1)' : 'transparent',
              boxShadow: active ? '3px 3px 0 var(--ink-2)' : 'none',
            }}>
              <div style={{fontFamily:'var(--display)', fontSize:15, fontWeight:600, letterSpacing:'.1em'}}>{s.ticker}</div>
              <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--ink-soft)', marginTop:4}}>${s.price.toFixed(0)}</div>
              {active && <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--blue)', marginTop:4}}>{Math.floor(10000/selected.length)/100}%</div>}
            </div>;
          })}
        </div>
      </div>
      <div style={{marginBottom:24}}>
        <label style={labelStyle}>Creator Fee (%)</label>
        <input style={{...inputStyle, width:120, fontFamily:'var(--mono)', fontSize:14}} value={feePct}
          onChange={e => { const v = e.target.value; if (/^\d*\.?\d*$/.test(v) && parseFloat(v || '0') <= 5) setFeePct(v); }} />
      </div>

      {result?.status === 'success' ? <div style={{border:'1px solid var(--green)', padding:16, marginBottom:16, background:'rgba(59,140,110,.06)'}}>
        <div style={{fontFamily:'var(--display)', fontWeight:600, fontSize:16, color:'var(--green)', marginBottom:8}}>Index Deployed Successfully</div>
        <div style={{fontFamily:'var(--mono)', fontSize:11, color:'var(--ink-soft)', wordBreak:'break-all'}}>
          Address: <a href={RH_EXPLORER.replace('/token/','/address/') + result.address} target="_blank" style={{color:'var(--blue)'}}>{result.address}</a>
        </div>
        <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-mute)', marginTop:4}}>Tx: {result.tx}</div>
      </div> : result?.status === 'error' ? <div style={{border:'1px solid var(--red)', padding:16, marginBottom:16}}>
        <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--red)'}}>{result.message}</div>
      </div> : result?.status === 'pending' ? <div style={{border:'1px solid var(--blue)', padding:16, marginBottom:16}}>
        <div style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--blue)'}}>Transaction pending... {result.tx.slice(0,14)}...</div>
      </div> : null}

      <button className="btn primary" style={{padding:'12px 24px', fontSize:12}} onClick={deploy} disabled={deploying || !wallet}>
        {!wallet ? 'Connect Wallet First' : deploying ? 'Deploying...' : `Deploy $${idxSymbol || 'INDEX'} on Robinhood Chain`}
      </button>
    </div>
  </>;
}

// ─── RAIL ───
function RightRail({ setView }) {
  return <aside className="rail">
    <div className="rail-section">
      <div className="rail-kicker">AI Agent</div>
      <h3>Terminal <span className="deco">&middot; &#10057;</span></h3>
      <div className="terminal-mini" onClick={() => setView('terminal')} style={{cursor:'pointer'}}>
        <div className="tbody">
          <div><span className="prompt">&gt;</span> buy $500 of TSLA</div>
          <div className="response">Buy 2.67 TSLA at $187.34</div>
          <div className="success" style={{color:'var(--green)'}}>&#10003; Order filled.</div>
          <br/>
          <div style={{color:'var(--ink-mute)', fontSize:10, letterSpacing:'.15em'}}>Click to open full terminal &rarr;</div>
        </div>
      </div>
    </div>
    <div className="rail-section">
      <div className="rail-kicker">On-Chain</div>
      <h3>Index Funds <span className="deco">&middot; &#10022;</span></h3>
      {DEPLOYED_INDICES.length > 0
        ? DEPLOYED_INDICES.map((idx, i) => <div key={i} className="feed-item">
            <div className="feed-row"><span className="feed-action">{idx.symbol}</span><span className="feed-tag create">live</span></div>
            <div className="feed-detail">{idx.name} ({idx.stocks.join(', ')})</div>
            <div className="feed-time">Supply: {idx.totalSupply.toFixed(2)}</div>
          </div>)
        : <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-mute)', padding:'12px 0'}}>No indices deployed yet</div>
      }
    </div>
    <div className="rail-section">
      <div className="rail-kicker">Protocol</div>
      <h3>Factory <span className="deco">&middot; &#9830;</span></h3>
      <div className="treas-value">{DEPLOYED_INDICES.length}<span className="unit">index</span></div>
      <div className="treas-delta">{STOCKS.filter(s=>s.live).length} stocks live</div>
      <div className="treas-breakdown">
        <div className="treas-row"><span>Supply</span><b>{DEPLOYED_INDICES.reduce((s,i)=>s+i.totalSupply,0).toFixed(1)}</b></div>
        <div className="treas-row"><span>Stocks</span><b>{STOCKS.filter(s=>s.live).map(s=>s.ticker).join(', ')}</b></div>
        <div className="treas-row"><span>Chain</span><b>RH Testnet</b></div>
      </div>
    </div>
  </aside>;
}

// ─── APP ───
function App() {
  const validViews = ['overview','indices','stocks','terminal','portfolio','treasury','create'];
  const hashView = window.location.hash.replace('#','');
  const [view, setView] = useState(validViews.includes(hashView) ? hashView : 'overview');
  const { wallet, balances, loading: walletLoading, connect: connectW, refresh: refreshBalances } = useWallet();
  const { pricesLoaded, lastUpdate } = useLivePrices();
  // Force re-render when prices update
  const [, forceUpdate] = useState(0);
  useEffect(() => { if (lastUpdate) forceUpdate(n => n + 1); }, [lastUpdate]);

  useEffect(() => {
    function onHash(){ const v = window.location.hash.replace('#',''); if(validViews.includes(v)) setView(v); }
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const menuItems = [
    { group:'Markets', items: [
      { key:'overview', num:'I.', label:'Overview' },
      { key:'indices', num:'II.', label:'Index' },
      { key:'stocks', num:'III.', label:'Stocks' },
    ]},
    { group:'Trade', items: [
      { key:'terminal', num:'IV.', label:'Terminal' },
      { key:'portfolio', num:'V.', label:'Portfolio' },
    ]},
    { group:'Protocol', items: [
      { key:'treasury', num:'VI.', label:'Treasury' },
      { key:'create', num:'VII.', label:'Create Index' },
      { key:'liquidity', num:'VIII.', label:'Provide Liquidity' },
    ]},
  ];

  const showRail = view === 'overview' || view === 'indices' || view === 'stocks';

  return <div className={`app ${showRail ? 'has-rail' : ''}`}>
    <aside className="nav">
      <div className="brand">
        <div className="brand-seal" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none">
            <circle className="glyph-line" cx="16" cy="14" r="8"/>
            <path className="glyph-line" d="M8 22c0 0 4 5 8 5s8-5 8-5"/>
            <path className="glyph-line" d="M12 12v4M20 12v4"/>
            <path className="glyph-line" d="M4 14h4M24 14h4"/>
          </svg>
        </div>
        <div>
          <div className="brand-name">ATLAS</div>
          <div className="brand-sub">Stock Index Protocol</div>
        </div>
      </div>
      <div className="agent-status">
        <div className="agent-row"><span className="agent-dot"/> Agent &middot; Online</div>
        <div className="agent-mode">Mode &middot; {view === 'terminal' ? 'Terminal Active' : 'Ready'}</div>
        {wallet
          ? <div className="agent-mode" style={{color:'var(--green)'}}>{wallet.address.slice(0,6)}...{wallet.address.slice(-4)} &middot; {(balances.RBH || 0).toFixed(4)} RBH</div>
          : <div className="agent-mode" style={{color:'var(--ink-mute)', cursor:'pointer', textDecoration:'underline'}} onClick={connectW}>{walletLoading ? 'Connecting...' : 'Connect Wallet'}</div>
        }
      </div>
      <nav className="menu">
        {menuItems.map(g => <React.Fragment key={g.group}>
          <div className="menu-label">{g.group}</div>
          {g.items.map(item =>
            <div key={item.key} className={`menu-item ${view === item.key ? 'active' : ''}`} onClick={() => setView(item.key)}>
              <span className="num">{item.num}</span> {item.label}
            </div>
          )}
        </React.Fragment>)}
      </nav>
      <div className="nav-footer">
        <div><span className="k">Network</span> &nbsp;{wallet ? <span style={{color:'var(--green)'}}>Robinhood Chain</span> : 'Robinhood Chain'}</div>
        <div><span className="k">Protocol</span> &nbsp;ATLAS Index v1</div>
        <div><span className="k">Prices</span> &nbsp;{pricesLoaded ? <span style={{color:'var(--green)'}}>Live</span> : 'Cached'}</div>
        <div><span className="k">Build</span> &nbsp;<b>v0.1.0 &middot; testnet</b></div>
        <a href="https://faucet.testnet.chain.robinhood.com/" target="_blank" rel="noopener noreferrer" style={{display:'block', marginTop:10, padding:'6px 10px', border:'1px solid var(--green)', color:'var(--green)', textAlign:'center', fontFamily:'var(--mono)', fontSize:9, letterSpacing:'.14em', textTransform:'uppercase', textDecoration:'none'}}>Get Testnet Stocks</a>
      </div>
    </aside>

    <main>
      {view === 'overview' && <OverviewView setView={setView} wallet={wallet} balances={balances} connectW={connectW} walletLoading={walletLoading} refreshBalances={refreshBalances}/>}
      {view === 'indices' && <IndicesView setView={setView} wallet={wallet} balances={balances} refreshBalances={refreshBalances}/>}
      {view === 'stocks' && <StocksView wallet={wallet} balances={balances} refreshBalances={refreshBalances}/>}
      {view === 'terminal' && <TerminalView wallet={wallet} balances={balances} refreshBalances={refreshBalances}/>}
      {view === 'portfolio' && <PortfolioView wallet={wallet} balances={balances} connectW={connectW} walletLoading={walletLoading}/>}
      {view === 'treasury' && <TreasuryView/>}
      {view === 'create' && <CreateIndexView setView={setView} wallet={wallet}/>}
      {view === 'liquidity' && <LiquidityView wallet={wallet} balances={balances} refreshBalances={refreshBalances}/>}
    </main>

    {showRail && <RightRail setView={setView}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
