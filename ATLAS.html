<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ATLAS · Stock Index Protocol</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Serif:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js" crossorigin></script>
<script src="config.js"></script>

<style>
  :root{
    --paper: #F1EEE7;
    --paper-2: #EAE5DA;
    --paper-3: #DED7C8;
    --ink: #1D2A44;
    --ink-2: #223A66;
    --ink-soft: #4A5775;
    --ink-mute: #7C84A0;
    --rule: #C9BFA8;
    --rule-soft: #D8D0BC;
    --blue: #5E79B2;
    --blue-2: #6B84B8;
    --blue-mist: #B8C8E8;
    --blue-veil: #D7E1F2;
    --ochre: #8A6B33;
    --green: #3B8C6E;
    --red: #9E3424;
    --serif: "Cinzel", "IBM Plex Serif", Georgia, serif;
    --display: "Cinzel", Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background: var(--paper); color: var(--ink); font-family: var(--sans); }
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 800px at 80% -10%, rgba(94,121,178,.06), transparent 60%),
      radial-gradient(1000px 700px at -5% 110%, rgba(184,200,232,.10), transparent 60%),
      var(--paper);
    position:relative;
  }
  body::before{
    content:""; position:fixed; inset:0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.11  0 0 0 0 0.16  0 0 0 0 0.27  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
    mix-blend-mode: multiply; opacity:.35; pointer-events:none; z-index:1;
  }
  body::after{
    content:""; position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(91deg, transparent 0 80px, rgba(34,58,102,.025) 80px 81px),
      repeating-linear-gradient(178deg, transparent 0 140px, rgba(34,58,102,.02) 140px 141px);
    pointer-events:none; z-index:1;
  }
  .app{ position:relative; z-index:2; display:grid; grid-template-columns: 232px 1fr; min-height:100vh; }
  .app.has-rail{ grid-template-columns: 232px 1fr 320px; }

  /* ============ SIDEBAR ============ */
  aside.nav{
    border-right: 1px solid var(--rule); padding: 22px 18px 22px 22px;
    background: linear-gradient(180deg, rgba(94,121,178,.04), transparent 30%), var(--paper);
    display:flex; flex-direction:column; gap:22px; position:relative;
  }
  aside.nav::after{
    content:""; position:absolute; right:-1px; top:24px; bottom:24px; width:1px;
    background: linear-gradient(180deg, transparent, var(--rule) 8%, var(--rule) 92%, transparent);
  }
  .brand{ display:flex; align-items:flex-start; gap:12px; padding-bottom:18px; border-bottom:1px solid var(--rule); }
  .brand-seal{
    width:48px; height:48px; border:1.5px solid var(--ink); border-radius:50%;
    display:grid; place-items:center; color:var(--ink); position:relative; background: var(--paper);
  }
  .brand-seal::before{ content:""; position:absolute; inset:3px; border:1px solid var(--ink); border-radius:50%; }
  .brand-seal svg{ width:26px; height:26px; }
  .brand-name{ font-family:var(--display); font-weight:600; font-size:20px; letter-spacing:.18em; line-height:1; margin-top:2px;}
  .brand-sub{ font-family:var(--mono); font-size:9.5px; letter-spacing:.22em; color:var(--ink-soft); text-transform:uppercase; margin-top:8px;}

  .agent-status{
    border:1px solid var(--rule); padding:12px; display:flex; flex-direction:column; gap:6px;
    background: rgba(184,200,232,.18); position:relative;
  }
  .agent-status::before{
    content:"※"; position:absolute; top:-9px; left:10px; background:var(--paper); padding:0 6px;
    font-size:11px; color:var(--ink-soft);
  }
  .agent-row{ display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink); }
  .agent-dot{ width:7px; height:7px; border-radius:50%; background: var(--green); position:relative; }
  .agent-dot::after{ content:""; position:absolute; inset:-4px; border-radius:50%; border:1px solid var(--green); opacity:.4; animation: pulse 2.4s ease-out infinite;}
  @keyframes pulse{ 0%{transform:scale(.6); opacity:.6;} 100%{transform:scale(1.6); opacity:0;} }
  .agent-mode{ font-family:var(--mono); font-size:9.5px; letter-spacing:.2em; color:var(--ink-soft); }

  nav.menu{ display:flex; flex-direction:column; gap:2px; }
  .menu-label{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.24em; color:var(--ink-mute);
    text-transform:uppercase; margin: 6px 4px 8px; display:flex; align-items:center; gap:8px;
  }
  .menu-label::after{ content:""; flex:1; height:1px; background: var(--rule); }
  .menu-item{
    display:flex; align-items:center; gap:10px; padding:9px 10px; cursor:pointer;
    font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:var(--ink-soft);
    text-transform:uppercase; border:1px solid transparent; transition: all .15s ease; position:relative;
  }
  .menu-item .num{ font-family:var(--mono); font-size:9.5px; color:var(--ink-mute); width:22px; }
  .menu-item:hover{ color:var(--ink); background: rgba(94,121,178,.08); }
  .menu-item.active{
    color:var(--ink); background: var(--paper); border:1px solid var(--ink); box-shadow: 3px 3px 0 var(--ink-2);
  }
  .menu-item.active::before{ content:"▸"; position:absolute; left:-14px; color:var(--ink); }

  .nav-footer{ margin-top:auto; padding-top:16px; border-top:1px solid var(--rule); font-family:var(--mono); font-size:9.5px; color:var(--ink-soft); letter-spacing:.18em; line-height:1.7; }
  .nav-footer .k{ color:var(--ink-mute); }
  .nav-footer b{ color:var(--ink); font-weight:500; }

  /* ============ MAIN ============ */
  main{ padding: 26px 32px 60px; min-width:0; overflow-y:auto; }
  .crumbs{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  .crumbs .path{ font-family:var(--mono); font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-mute); }
  .crumbs .path b{ color:var(--ink); font-weight:500; }
  .actions{ display:flex; gap:10px; align-items:center; }
  .btn{
    font-family:var(--mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    border:1px solid var(--ink); background:var(--paper); color:var(--ink);
    padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    transition: all .15s ease;
  }
  .btn:hover{ background: var(--ink); color: var(--paper); }
  .btn.primary{ background:var(--ink); color:var(--paper); }
  .btn.primary:hover{ background:var(--ink-2); }
  .btn.ghost{ border-color: var(--rule); color: var(--ink-soft); }
  .btn.ghost:hover{ color: var(--ink); border-color: var(--ink); background: transparent; }

  /* Hero */
  .hero{
    margin-top:18px; padding: 6px 0 22px;
    border-top: 2px solid var(--ink); border-bottom: 1px solid var(--ink); position:relative;
  }
  .hero::after{ content:""; position:absolute; top:6px; left:0; right:0; height:1px; background:var(--ink); }
  .hero-meta{
    font-family:var(--mono); font-size:9.5px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--ink-soft); display:flex; gap:24px; padding: 14px 0 6px; flex-wrap:wrap;
  }
  .hero-meta span b{ color:var(--ink); font-weight:500; }
  .hero h1{
    font-family:var(--display); font-weight:600; font-size: clamp(42px, 5vw, 78px);
    letter-spacing:.01em; line-height:.95; margin: 12px 0 18px; color:var(--ink);
  }
  .hero h1 .amp{ color:var(--blue); font-style:italic; font-family:"IBM Plex Serif", serif; font-weight:400; }
  .hero-lede{ font-family:var(--sans); font-size:14px; line-height:1.55; color:var(--ink-soft); max-width: 780px; }
  .hero-lede em{ color:var(--ink); font-style:italic; }

  /* Stats */
  .stats{ display:grid; grid-template-columns: repeat(4, 1fr); gap:0; margin-top: 26px; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
  .stat{ padding: 18px; border-right: 1px solid var(--rule); position:relative; }
  .stat:last-child{ border-right:none; }
  .stat-roman{ position:absolute; top:14px; right:14px; font-family:var(--display); font-size:11px; color:var(--ink-mute); letter-spacing:.1em; }
  .stat-label{ font-family:var(--mono); font-size:9.5px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:14px; }
  .stat-value{ font-family:var(--display); font-weight:600; font-size: 36px; line-height:1; color:var(--ink); font-feature-settings:"tnum"; }
  .stat-value .unit{ font-size:18px; color:var(--ink-soft); margin-left:4px; font-weight:500;}
  .stat-foot{ margin-top:12px; font-family:var(--mono); font-size:10px; letter-spacing:.06em; color:var(--ink-soft); }
  .stat-foot .up{ color: var(--green); }
  .spark{ position:absolute; bottom:14px; right:14px; }
  .spark svg path{ fill:none; stroke: var(--blue); stroke-width:1.2; }
  .spark svg circle{ fill: var(--ink); }

  /* ── Overview Dashboard (AgentBase style) ── */
  .ov-stats{ display:grid; grid-template-columns: repeat(4, 1fr); gap:14px; margin-top:22px; }
  .ov-stat{
    min-height:126px; padding:18px 20px; position:relative;
    background: linear-gradient(135deg, rgba(94,121,178,.06), rgba(184,200,232,.04));
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--rule);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
    transition: border-color .2s, background .2s;
  }
  .ov-stat:hover{ border-color: var(--blue); background: linear-gradient(135deg, rgba(94,121,178,.12), rgba(184,200,232,.08)); }
  .ov-stat .ov-stat-icon{
    width:34px; height:34px; border-radius:8px; display:grid; place-items:center;
    background: rgba(94,121,178,.12); color: var(--blue); margin-bottom:10px;
  }
  .ov-stat .ov-stat-icon svg{ width:18px; height:18px; }
  .ov-stat .ov-stat-val{ font-family:var(--display); font-weight:700; font-size:30px; line-height:1; color:var(--ink); font-feature-settings:"tnum"; }
  .ov-stat .ov-stat-val .unit{ font-size:15px; color:var(--ink-soft); margin-left:4px; font-weight:500; }
  .ov-stat .ov-stat-lbl{ font-family:var(--mono); font-size:9.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-soft); margin-top:8px; }
  .ov-stat .ov-stat-foot{ font-family:var(--mono); font-size:10px; color:var(--ink-mute); margin-top:6px; }
  .ov-stat .ov-stat-foot .up{ color:var(--green); }

  .ov-grid{ display:grid; grid-template-columns: minmax(0, 1fr) 370px; gap:18px; margin-top:22px; }

  .ov-panel{
    border: 1px solid var(--rule); position:relative;
    background: linear-gradient(135deg, rgba(94,121,178,.04), rgba(184,200,232,.02));
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
  }
  .ov-panel-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px; border-bottom:1px solid var(--rule);
  }
  .ov-panel-head h3{
    font-family:var(--display); font-weight:600; font-size:15px; letter-spacing:.14em; text-transform:uppercase; margin:0; color:var(--ink);
  }
  .ov-panel-head .ov-link{
    font-family:var(--mono); font-size:9px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--blue); cursor:pointer; transition: opacity .15s;
  }
  .ov-panel-head .ov-link:hover{ opacity:.7; }
  .ov-panel-body{ padding:0; }
  .ov-panel-body .ov-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 18px; border-bottom:1px solid var(--rule-soft); transition: background .12s;
  }
  .ov-panel-body .ov-row:last-child{ border-bottom:none; }
  .ov-panel-body .ov-row:hover{ background: rgba(94,121,178,.04); }

  .ov-cta-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-top:18px; }
  .ov-cta{
    padding:22px 20px; border:1px solid var(--rule); cursor:pointer;
    background: linear-gradient(135deg, rgba(94,121,178,.04), rgba(184,200,232,.02));
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
    transition: border-color .2s, background .2s;
  }
  .ov-cta:hover{ border-color: var(--blue); background: linear-gradient(135deg, rgba(94,121,178,.10), rgba(184,200,232,.06)); }

  /* Section titles */
  .sec-title{
    margin: 36px 0 16px; display:flex; align-items:baseline; gap:16px;
    border-bottom: 1px solid var(--ink); padding-bottom: 10px; position:relative;
  }
  .sec-title::after{ content:""; position:absolute; bottom:-4px; left:0; right:0; height:1px; background: var(--ink); }
  .sec-title h2{ font-family:var(--display); font-weight:600; font-size: 22px; letter-spacing:.18em; margin:0; color:var(--ink); text-transform:uppercase; }
  .sec-title .kicker{ font-family:var(--mono); font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-mute); }
  .sec-title .ornament{ font-family:var(--display); color:var(--blue); font-size:18px; letter-spacing:.4em; flex:1; text-align:center; opacity:.6; }
  .sec-title .right{ margin-left:auto; font-family:var(--mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); }

  /* Feature */
  .feature{ margin-top:20px; display:grid; grid-template-columns: 1.45fr 1fr; gap: 28px; align-items:start; }
  .feature-text .eyebrow{ font-family:var(--mono); font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--ink-soft); display:flex; gap:12px; align-items:center; }
  .feature-text .eyebrow .tag{ border:1px solid var(--ink); padding:3px 8px; font-size:9px; color:var(--ink); }
  .feature-text h3{ font-family:var(--display); font-weight:600; font-size: 36px; line-height:1.05; letter-spacing:.01em; margin: 12px 0 14px; color:var(--ink); }
  .feature-text h3 .arr{ color: var(--blue); font-family: var(--mono); font-weight:300; font-size:.7em; vertical-align:middle; margin: 0 6px; }
  .feature-text p.dek{ font-family:var(--sans); font-size:13.5px; line-height:1.6; color:var(--ink-soft); max-width:560px; }
  .feature-text p.dek::first-letter{ font-family: var(--display); font-size: 42px; float:left; line-height:.85; padding: 4px 8px 0 0; color: var(--ink); font-weight:600; }
  .quad{ margin-top:18px; display:grid; grid-template-columns: 1fr 1fr; border-top:1px solid var(--ink); border-left:1px solid var(--ink); }
  .quad .cell{ border-right:1px solid var(--ink); border-bottom:1px solid var(--ink); padding:14px 16px; }
  .quad .k{ font-family:var(--mono); font-size:9.5px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px;}
  .quad .v{ font-family:var(--display); font-size:14px; color:var(--ink); letter-spacing:.06em; }
  .quad .v.num{ font-size:26px; font-weight:600; }

  /* Index card */
  .index-card{ border:1px solid var(--ink); background: var(--paper); padding: 18px; position:relative; }
  .index-card-tag{ position:absolute; top:-10px; left:18px; background: var(--paper); padding: 2px 8px; font-family: var(--display); font-size: 11px; letter-spacing:.2em; color: var(--ink); border:1px solid var(--ink); }
  .index-composition{ margin-top:8px; }
  .index-stock{ display:flex; justify-content:space-between; align-items:center; padding: 12px 0; border-bottom:1px solid var(--rule); font-family:var(--mono); font-size:12px; }
  .index-stock:last-child{ border-bottom:none; }
  .stock-ticker{ font-family:var(--display); font-size:14px; font-weight:600; letter-spacing:.1em; color:var(--ink); }
  .stock-full{ font-size:11px; color:var(--ink-soft); letter-spacing:.06em; margin-left:10px; }
  .stock-weight{ font-family:var(--display); font-size:18px; font-weight:600; color:var(--blue); }
  .stock-price{ color:var(--ink-soft); font-size:11px; letter-spacing:.06em; }
  .stock-change{ font-size:11px; letter-spacing:.06em; }
  .stock-change.up{ color: var(--green); }
  .stock-change.dn{ color: var(--red); }
  .index-footer{ margin-top:14px; padding-top:12px; border-top:1px solid var(--ink); display:flex; justify-content:space-between; font-family:var(--mono); font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color: var(--ink-soft); }
  .index-footer b{ color:var(--ink); font-weight:500; }

  /* Pipeline */
  .pipeline{ margin-top:14px; border: 1px solid var(--ink); background: var(--paper); }
  .pipe-grid{ display:grid; grid-template-columns: repeat(5, 1fr); }
  .pipe-step{ padding: 18px 16px; border-right: 1px solid var(--rule); position:relative; }
  .pipe-step:last-child{ border-right:none;}
  .pipe-step .roman{ font-family:var(--display); font-size:11px; letter-spacing:.1em; color: var(--blue); margin-bottom:8px; display:inline-block; border-bottom: 1px solid var(--rule); padding-bottom:4px; }
  .pipe-step .glyph{ width:30px; height:30px; margin-bottom:12px; color:var(--ink); }
  .pipe-step h4{ font-family:var(--display); font-size:14px; letter-spacing:.16em; text-transform:uppercase; margin:0 0 6px; font-weight:600; }
  .pipe-step p{ font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--ink-soft); margin:0; line-height:1.5; }
  .pipe-arrow{ position:absolute; right:-7px; top:48px; width:13px; height:13px; background: var(--paper); border-top: 1px solid var(--ink); border-right: 1px solid var(--ink); transform: rotate(45deg); z-index:2; }
  .pipe-step:last-child .pipe-arrow{ display:none; }

  /* Table */
  table.indices{ width:100%; border-collapse: collapse; margin-top:8px;}
  table.indices th{ text-align:left; font-family:var(--mono); font-size:9.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-soft); padding: 10px 12px 8px; border-bottom: 1px solid var(--ink); font-weight:400; }
  table.indices td{ padding: 14px 12px; border-bottom: 1px solid var(--rule); font-family:var(--sans); font-size:13px; color:var(--ink); vertical-align: top; }
  table.indices tr:hover td{ background: rgba(184,200,232,.18); cursor:pointer; }
  td.idx-id{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); letter-spacing:.1em; width:80px;}
  td.idx-name{ font-family:var(--display); font-size:14px; letter-spacing:.04em; font-weight:500; }
  td.idx-stocks{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); letter-spacing:.06em; }
  td.idx-tvl{ font-family:var(--display); font-size:16px; font-weight:600; }
  td.idx-perf{ font-family:var(--mono); font-size:12px; letter-spacing:.05em; }
  td.idx-perf.up{ color: var(--green); }
  td.idx-perf.dn{ color: var(--red); }
  td.idx-fee{ font-family:var(--mono); font-size:12px; color:var(--ink-soft); }
  .pill{ font-family:var(--mono); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; padding: 3px 9px; border: 1px solid var(--ink); display:inline-block; }
  .pill.live{ border-color: var(--green); color: var(--green); }
  .pill.new{ background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .pill.hot{ border-color: var(--ochre); color: var(--ochre); }

  /* Right rail */
  aside.rail{
    border-left: 1px solid var(--rule); padding: 26px 22px;
    display:flex; flex-direction:column; gap:24px;
    background: linear-gradient(180deg, rgba(184,200,232,.08), transparent 25%);
  }
  .rail-section h3{ font-family:var(--display); font-size:14px; letter-spacing:.18em; text-transform:uppercase; margin:0 0 4px; font-weight:600; display:flex; align-items:center; gap:10px; border-bottom: 1px solid var(--ink); padding-bottom: 8px; }
  .rail-section h3 .deco{ font-weight:400; color: var(--blue); letter-spacing:.2em;}
  .rail-kicker{ font-family:var(--mono); font-size:9.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-mute); margin-bottom:10px; }

  /* Terminal mini (rail) */
  .terminal-mini{
    background: var(--paper-2); border: 1px solid var(--ink); padding: 14px;
    font-family: var(--mono); font-size: 11px; line-height: 1.7; color: var(--ink-soft); position:relative; overflow:hidden;
  }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ─── DATA ───
// Robinhood Chain Testnet explorer base
const RH_EXPLORER = 'https://explorer.testnet.chain.robinhood.com/token/';

// Official Robinhood Chain Testnet stock tokens (from faucet) + coming soon
let STOCKS = [
  // Live on testnet (official faucet tokens)
  { ticker:'TSLA', name:'Tesla Inc.', price:187.34, change:-1.12, token:'0xC9f9c86933092BbbfFF3CCb4b105A4A94bf3Bd4E', live:true },
  { ticker:'AMZN', name:'Amazon.com Inc.', price:191.75, change:2.11, token:'0x5884aD2f920c162CFBbACc88C9C51AA75eC09E02', live:true },
  { ticker:'NFLX', name:'Netflix Inc.', price:634.20, change:1.92, token:'0x3b8262A63d25f0477c4DDE23F83cfe22Cb768C93', live:true },
  { ticker:'AMD', name:'AMD Inc.', price:162.44, change:2.88, token:'0x71178BAc73cBeb415514eB542a8995b82669778d', live:true },
  { ticker:'PLTR', name:'Palantir Technologies', price:118.50, change:3.72, token:'0x1FBE1a0e43594b3455993B5dE5Fd0A7A266298d0', live:true },
  // Coming soon (not yet on testnet)
  { ticker:'AAPL', name:'Apple Inc.', price:198.42, change:1.24, live:false },
  { ticker:'MSFT', name:'Microsoft Corp.', price:442.18, change:0.87, live:false },
  { ticker:'GOOG', name:'Alphabet Inc.', price:176.33, change:-0.42, live:false },
  { ticker:'NVDA', name:'NVIDIA Corp.', price:892.40, change:3.45, live:false },
  { ticker:'META', name:'Meta Platforms', price:498.22, change:1.78, live:false },
  { ticker:'JPM', name:'JPMorgan Chase', price:198.90, change:1.45, live:false },
  { ticker:'GS', name:'Goldman Sachs', price:468.12, change:2.10, live:false },
  { ticker:'DIS', name:'Walt Disney Co.', price:112.55, change:-0.67, live:false },
  { ticker:'KO', name:'Coca-Cola Co.', price:62.30, change:-0.55, live:false },
  { ticker:'INTC', name:'Intel Corp.', price:31.20, change:-1.44, live:false },
];

// No mock indices - all indices come from on-chain DEPLOYED_INDICES via IndexFactory

// ─── LIVE STOCK PRICES ───
const PRICES_API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? '/api/prices'
  : (window.location.origin + '/api/prices');

async function fetchLivePrices() {
  try {
    const tickers = STOCKS.map(s => s.ticker).join(',');
    const res = await fetch(PRICES_API + '?symbols=' + tickers);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    STOCKS = STOCKS.map(s => {
      const p = data[s.ticker];
      if (p && p.price) return { ...s, price: p.price, change: p.change };
      return s;
    });
    return true;
  } catch (err) {
    console.warn('Live prices unavailable, using defaults:', err.message);
    return false;
  }
}

function useLivePrices() {
  const [pricesLoaded, setPricesLoaded] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);
  useEffect(() => {
    fetchLivePrices().then(ok => { setPricesLoaded(ok); if (ok) setLastUpdate(new Date()); });
    const interval = setInterval(() => {
      fetchLivePrices().then(ok => { setPricesLoaded(ok); if (ok) setLastUpdate(new Date()); });
    }, 30000); // refresh every 30s
    return () => clearInterval(interval);
  }, []);
  return { pricesLoaded, lastUpdate };
}

// ─── CONTRACTS & CHAIN ───
const FACTORY_ADDRESS = '0xE0136684FaA29801885e1faF619bc5C8894CA35D';

const ERC20_ABI = ['function balanceOf(address) view returns (uint256)', 'function decimals() view returns (uint8)', 'function transfer(address to, uint256 amount) returns (bool)', 'function approve(address spender, uint256 amount) returns (bool)', 'function allowance(address owner, address spender) view returns (uint256)', 'function symbol() view returns (string)', 'function name() view returns (string)', 'function totalSupply() view returns (uint256)'];

const INDEX_TOKEN_ABI = [...ERC20_ABI, 'function mint(uint256 amount)', 'function burn(uint256 amount)', 'function getStocks() view returns (address[])', 'function getWeights() view returns (uint256[])', 'function creator() view returns (address)', 'function feeBps() view returns (uint256)', 'function vault() view returns (address)', 'function stockCount() view returns (uint256)', 'function stocks(uint256) view returns (address)', 'function weights(uint256) view returns (uint256)'];

const FACTORY_ABI = ['function createIndex(string name, string symbol, address[] stocks, uint256[] weights, uint256 feeBps) returns (address)', 'function totalIndices() view returns (uint256)', 'function allIndices(uint256) view returns (address)', 'function getCreatorIndices(address creator) view returns (address[])', 'function vault() view returns (address)', 'event IndexCreated(address indexed indexToken, string name, string symbol, address indexed creator, address[] stocks, uint256[] weights, uint256 feeBps)'];

// ─── ATLAS VAULT ───
const VAULT_ADDRESS = '0x3130865dE0D1594E38C5cC52596712F05d93a4d5';
const VAULT_ABI = [
  'function deposit(address token, uint256 amount)',
  'function withdraw(address token, uint256 amount)',
  'function buyIndex(address indexToken, uint256 amount)',
  'function sellIndex(address indexToken, uint256 amount)',
  'function getVaultBalance(address token) view returns (uint256)',
  'function getLPCount() view returns (uint256)',
  'function lpTokenDeposits(address lp, address token) view returns (uint256)',
  'function owner() view returns (address)',
];

// Track deployed index tokens (loaded from factory on-chain)
let DEPLOYED_INDICES = [];

const RH_NETWORK = {
  chainId: typeof RH_CHAIN_ID_HEX !== 'undefined' ? RH_CHAIN_ID_HEX : '0xb626',
  chainName: 'Robinhood Chain Testnet',
  rpcUrls: [typeof RH_RPC !== 'undefined' ? RH_RPC : 'https://rpc.testnet.chain.robinhood.com'],
  nativeCurrency: { name: 'RBH', symbol: 'RBH', decimals: 18 },
  blockExplorerUrls: ['https://explorer.testnet.chain.robinhood.com'],
};

async function connectWallet() {
  if (!window.ethereum) { alert('Please install MetaMask to connect.'); return null; }
  try {
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    // Switch to Robinhood Chain
    try {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: RH_NETWORK.chainId }] });
    } catch (switchErr) {
      if (switchErr.code === 4902) {
        await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [RH_NETWORK] });
      } else { throw switchErr; }
    }
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const address = await signer.getAddress();
    return { provider, signer, address };
  } catch (err) { console.error('Wallet connection failed:', err); return null; }
}

async function loadDeployedIndices(provider) {
  try {
    const factory = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, provider);
    const total = await factory.totalIndices();
    const indices = [];
    for (let i = 0; i < Number(total); i++) {
      const addr = await factory.allIndices(i);
      const token = new ethers.Contract(addr, INDEX_TOKEN_ABI, provider);
      const [name, symbol, supply, creator, feeBps, stockAddrs, weightVals] = await Promise.all([
        token.name(), token.symbol(), token.totalSupply(),
        token.creator(), token.feeBps(),
        token.getStocks(), token.getWeights(),
      ]);
      // Map stock addresses to tickers
      const stockTickers = stockAddrs.map(a => {
        const s = STOCKS.find(st => st.token && st.token.toLowerCase() === a.toLowerCase());
        return s ? s.ticker : a.slice(0,8);
      });
      indices.push({
        address: addr, name, symbol: '$' + symbol, ticker: '$' + symbol,
        totalSupply: parseFloat(ethers.formatEther(supply)),
        creator, feeBps: Number(feeBps),
        stocks: stockTickers,
        stockAddresses: [...stockAddrs],
        weights: weightVals.map(w => Number(w)),
        live: true, onChain: true,
      });
    }
    DEPLOYED_INDICES = indices;
    return indices;
  } catch (err) { console.warn('Failed to load indices:', err); return []; }
}

async function fetchBalances(providerOrRpc, address) {
  const provider = typeof providerOrRpc === 'string'
    ? new ethers.JsonRpcProvider(providerOrRpc)
    : providerOrRpc;
  const liveStocks = STOCKS.filter(s => s.live && s.token);
  const results = {};
  // Native RBH balance
  const nativeBal = await provider.getBalance(address);
  results['RBH'] = parseFloat(ethers.formatEther(nativeBal));
  // ERC-20 stock balances
  await Promise.all(liveStocks.map(async (s) => {
    try {
      const c = new ethers.Contract(s.token, ERC20_ABI, provider);
      const bal = await c.balanceOf(address);
      const dec = await c.decimals();
      results[s.ticker] = parseFloat(ethers.formatUnits(bal, dec));
    } catch { results[s.ticker] = 0; }
  }));
  // Index token balances
  await Promise.all(DEPLOYED_INDICES.map(async (idx) => {
    try {
      const c = new ethers.Contract(idx.address, ERC20_ABI, provider);
      const bal = await c.balanceOf(address);
      results[idx.symbol] = parseFloat(ethers.formatEther(bal));
    } catch { results[idx.symbol] = 0; }
  }));
  return results;
}

function useWallet() {
  const [wallet, setWallet] = useState(null);
  const [balances, setBalances] = useState({});
  const [loading, setLoading] = useState(false);

  const connect = async () => {
    setLoading(true);
    const w = await connectWallet();
    if (w) {
      setWallet(w);
      await loadDeployedIndices(w.provider);
      const bals = await fetchBalances(w.provider, w.address);
      setBalances(bals);
      // Listen for account/chain changes
      window.ethereum.on('accountsChanged', () => window.location.reload());
      window.ethereum.on('chainChanged', () => window.location.reload());
    }
    setLoading(false);
  };

  const refresh = async () => {
    if (!wallet) return;
    const bals = await fetchBalances(wallet.provider, wallet.address);
    setBalances(bals);
  };

  return { wallet, balances, loading, connect, refresh };
}

// ─── AI AGENT CONFIG ───
// Keys loaded from config.js (gitignored)
let tavilyKeyIdx = 0;

// Trigger web search broadly - almost any question or request benefits from real-time data
const SEARCH_PATTERN = /\?|what\s|how\s|when\s|who\s|why\s|where\s|is\s|are\s|was\s|were\s|will\s|can\s|do\s|does\s|did\s|price|worth|trending|news|current|latest|check|find|tell me|info|explain|market|today|announce|search|busca|mira|link|url|video|tutorial|youtube|recipe|receta|dame|give me|show me|look up|internet|web|online/i;

const LIVE_TICKERS = STOCKS.filter(s => s.live).map(s => s.ticker);
function getSystemPrompt(userBalances) {
  const stockList = STOCKS.filter(s => s.live).map(s => `- ${s.ticker} (${s.name}): $${s.price.toFixed(2)}, 24h: ${s.change > 0 ? '+' : ''}${s.change}%`).join('\n');
  const unavailable = STOCKS.filter(s => !s.live).map(s => s.ticker).join(', ');

// ─── TAVILY SEARCH ───
async function searchTavily(query) {
  for (let i = 0; i < TAVILY_KEYS.length; i++) {
    const key = TAVILY_KEYS[tavilyKeyIdx % TAVILY_KEYS.length];
    tavilyKeyIdx++;
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 5000);
      const res = await fetch('https://api.tavily.com/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: key, query, search_depth: 'basic', max_results: 3, include_answer: true }),
        signal: ctrl.signal,
      });
      clearTimeout(timer);
      if (!res.ok) continue;
      const data = await res.json();
      const parts = [];
      if (data.answer) parts.push('[Summary] ' + data.answer);
      if (data.results) data.results.slice(0, 3).forEach(r => parts.push(`[${r.title}] ${r.content?.slice(0, 200)} | URL: ${r.url}`));
      return parts.join('\n');
    } catch { continue; }
  }
  return null;
}

// ─── OPENAI CHAT ───
async function callAtlasAI(history, userBalances) {
  // Check if last user message needs web search
  const lastMsg = history.filter(m => m.role === 'user').pop();
  let searchContext = '';
  if (lastMsg && SEARCH_PATTERN.test(lastMsg.content)) {
    const results = await searchTavily(lastMsg.content);
    if (results) searchContext = '\n\nWEB SEARCH RESULTS (use to answer if relevant):\n' + results;
  }

  const messages = [
    { role: 'system', content: getSystemPrompt(userBalances) + searchContext },
    ...history.slice(-20),
  ];

  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + OPENAI_KEY,
    },
    body: JSON.stringify({
      model: OPENAI_MODEL,
      messages,
      temperature: 0.7,
      max_tokens: 600,
    }),
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error('OpenAI error: ' + err);
  }

  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || '';

  // Parse JSON response from AI
  try {
    // Strip markdown code fences if present
    const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
    return JSON.parse(cleaned);
  } catch {
    // If AI didn't return valid JSON, wrap it
    return { reply: raw, action: 'none', data: {} };
  }
}

// ─── BUILD CONFIRMATION MESSAGE ───
function buildConfirmation(parsed) {
  const { action, data } = parsed;

  if (action === 'buy' && data?.ticker && (data?.amount || data?.qty)) {
    const ticker = data.ticker.toUpperCase().replace(/^\$/, '');
    const stock = STOCKS.find(s => s.ticker === ticker);
    const idx = DEPLOYED_INDICES.find(i => {
      const sym = i.symbol.replace(/^\$/, '').toUpperCase();
      return sym === ticker || i.name.toUpperCase() === ticker || i.name.toUpperCase().includes(ticker);
    });
    if (idx) {
      const qty = data.qty || data.amount || 1;
      return {
        action: 'buy_index', data: { ...data, qty, index: idx },
        preview: [
          { type:'agent', text: parsed.reply },
          { type:'agent', text: `Buy ${qty} ${idx.symbol} (${idx.stocks.join(' + ')}) via AtlasVault` },
        ],
        onConfirm: [{ type:'success', text: `\u2713 Bought ${qty} ${idx.symbol}!` }],
        onCancel: [{ type:'error', text: 'Order cancelled.' }],
      };
    } else if (stock) {
      const qty = data.amount ? (data.amount / stock.price).toFixed(4) : data.qty;
      return {
        action: 'buy', data: { ...data, qty, stock },
        preview: [
          { type:'agent', text: parsed.reply },
          { type:'agent', text: `Buy ${qty} ${stock.ticker} at $${stock.price.toFixed(2)} via AtlasVault` },
        ],
        onConfirm: [{ type:'success', text: `\u2713 Order filled. ${qty} ${stock.ticker} added to your portfolio.` }],
        onCancel: [{ type:'error', text: 'Order cancelled.' }],
      };
    }
  }

  if (action === 'sell' && data?.ticker && data?.qty) {
    const ticker = data.ticker.toUpperCase().replace(/^\$/, '');
    const stock = STOCKS.find(s => s.ticker === ticker);
    const idx = DEPLOYED_INDICES.find(i => {
      const sym = i.symbol.replace(/^\$/, '').toUpperCase();
      return sym === ticker || i.name.toUpperCase() === ticker || i.name.toUpperCase().includes(ticker);
    });
    if (idx) {
      return {
        action: 'sell_index', data: { ...data, index: idx },
        preview: [
          { type:'agent', text: parsed.reply },
          { type:'agent', text: `Sell ${data.qty} ${idx.symbol} via AtlasVault` },
        ],
        onConfirm: [{ type:'success', text: `\u2713 Sold ${data.qty} ${idx.symbol}! Stocks returned to vault.` }],
        onCancel: [{ type:'error', text: 'Sale cancelled.' }],
      };
    } else if (stock) {
      const total = (data.qty * stock.price).toFixed(2);
      return {
        action: 'sell', data: { ...data, stock },
        preview: [
          { type:'agent', text: parsed.reply },
          { type:'agent', text: `Sell ${data.qty} ${stock.ticker} at $${stock.price.toFixed(2)}` },
        ],
        onConfirm: [{ type:'success', text: `\u2713 Sale complete. ${data.qty} ${stock.ticker} sent.` }],
        onCancel: [{ type:'error', text: 'Sale cancelled.' }],
      };
    }
  }

  if (action === 'create_index' && data?.indexName && data?.indexStocks?.length >= 2) {
    const w = Math.floor(100 / data.indexStocks.length);
    const symbol = data.indexTicker || data.indexName.replace(/\s+/g,'').slice(0,4).toUpperCase();
    return {
      action: 'create_index', data: { ...data, symbol },
      preview: [
        { type:'agent', text: parsed.reply },
        { type:'agent', text: `Index: "${data.indexName}" ($${symbol})` },
        { type:'agent', text: `Composition: ${data.indexStocks.map(t => `${t} ${w}%`).join(' | ')}` },
        { type:'agent', text: `Fee: 0.3% per mint/redeem` },
        { type:'agent', text: `This will deploy a real ERC-20 token on Robinhood Chain.` },
      ],
      onConfirm: [
        { type:'success', text: `\u2713 Index "$${symbol}" deployed on Robinhood Chain!` },
      ],
      onCancel: [
        { type:'error', text: 'Index creation cancelled.' },
      ],
    };
  }

  if (action === 'send' && data?.toAddress && data?.sendAmount && data?.sendToken) {
    return {
      action: 'send', data,
      preview: [
        { type:'agent', text: parsed.reply },
        { type:'agent', text: `Send ${data.sendAmount} ${data.sendToken} to ${data.toAddress.slice(0,6)}...${data.toAddress.slice(-4)}` },
      ],
      onConfirm: [
        { type:'success', text: `\u2713 Transaction sent. Tokens transferred successfully.` },
      ],
      onCancel: [
        { type:'error', text: 'Transfer cancelled.' },
      ],
    };
  }

  return null; // no confirmation needed
}

      holdings.forEach(s => {

        results.push({ type:'agent', text: `\u2502 ${s.ticker.padEnd(8)} ${qty.padStart(6)}   ${val.padStart(10)}   ${(s.change > 0 ? '+' : '') + s.change + '%'}`.padEnd(37) + '\u2502' });

      results.push({ type:'agent', text: '\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518' });
    } else {
      results.push({ type:'agent', text: 'Connect your wallet to view your portfolio. Click "Connect Wallet" in the sidebar.' });
    }
    return results;
  }

  if (action === 'price' && data?.ticker) {
    const stock = STOCKS.find(s => s.ticker === data.ticker.toUpperCase());
    if (stock) {
      results.push({ type:'agent', text: `${stock.ticker} · ${stock.name}` });
      results.push({ type:'agent', text: `Price: $${stock.price.toFixed(2)}` });
      results.push({ type:'agent', text: `24h: ${stock.change > 0 ? '+' : ''}${stock.change}%` });
      return results;
    }
  }

  // Default: just show the reply
  results.push({ type:'agent', text: parsed.reply || 'I couldn\'t process that request.' });
  return results;
}

function IndicesView({ setView, wallet, balances, refreshBalances }) {
  const [mintIdx, setMintIdx] = useState(null);
  const [mintAmount, setMintAmount] = useState('1');
  const [minting, setMinting] = useState(false);
  const [mintResult, setMintResult] = useState(null);

  const handleBuy = async (idx) => {
    if (!wallet) { alert('Connect wallet first'); return; }
    setMinting(true); setMintResult(null);
    try {
      const amount = ethers.parseEther(mintAmount);
      const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
      setMintResult({ ok: true, msg: 'Buying via AtlasVault... (1 tx)' });
      const tx = await vault.buyIndex(idx.address, amount);
      await tx.wait();
      if (refreshBalances) refreshBalances();
      setMintResult({ ok: true, msg: `Bought ${mintAmount} ${idx.symbol}! The vault provided the underlying stocks.` });
    } catch (err) {
      const msg = err.reason || err.message || 'Unknown error';
      if (msg.includes('insufficient liquidity')) {
        setMintResult({ ok: false, msg: 'Vault has insufficient stock liquidity. Try a smaller amount.' });
      } else {
        setMintResult({ ok: false, msg });
      }
    }
    setMinting(false);
  };

  const handleSell = async (idx) => {
    if (!wallet) { alert('Connect wallet first'); return; }
    setMinting(true); setMintResult(null);
    try {
      const amount = ethers.parseEther(mintAmount);
      // Approve index tokens to vault
      const indexContract = new ethers.Contract(idx.address, ERC20_ABI, wallet.signer);
      const allowance = await indexContract.allowance(wallet.address, VAULT_ADDRESS);
      if (allowance < amount) {
        setMintResult({ ok: true, msg: 'Approving index tokens...' });
        const approveTx = await indexContract.approve(VAULT_ADDRESS, amount);
        await approveTx.wait();
      }
      setMintResult({ ok: true, msg: 'Selling via AtlasVault...' });
      const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
      const tx = await vault.sellIndex(idx.address, amount);
      await tx.wait();
      if (refreshBalances) refreshBalances();
      setMintResult({ ok: true, msg: `Sold ${mintAmount} ${idx.symbol}! Stocks returned to vault.` });
    } catch (err) { setMintResult({ ok: false, msg: err.reason || err.message }); }
    setMinting(false);
  };

  return <>
    <div className="crumbs">
      <div className="path">Dashboard / <b>Index</b></div>
      <div className="actions">
        <button className="btn primary" onClick={() => setView('create')}>Create New Index</button>
      </div>
    </div>

    {/* All indices from on-chain */}
    <div className="sec-title" style={{marginTop:18}}>
      <span className="kicker">On-Chain</span>
      <h2>Deployed Indices</h2>
      <span className="ornament">&#10022; &middot; &#10022;</span>
    </div>
    {DEPLOYED_INDICES.length > 0 ? <>
      <table className="indices">
        <thead><tr><th>#</th><th>Name</th><th>Ticker</th><th>Stocks</th><th>Supply</th><th>Fee</th><th>Your Balance</th><th>Actions</th></tr></thead>
        <tbody>
          {DEPLOYED_INDICES.map((idx, i) => <React.Fragment key={idx.address}>
            <tr style={{cursor:'pointer'}} onClick={() => setMintIdx(mintIdx === idx.address ? null : idx.address)}>
              <td className="idx-id">{i + 1}</td>
              <td className="idx-name">{idx.name}</td>
              <td style={{fontFamily:'var(--mono)', fontSize:12, color:'var(--blue)', fontWeight:500}}>{idx.symbol}</td>
              <td className="idx-stocks">{idx.stocks.join(' \u00b7 ')}</td>
              <td style={{fontFamily:'var(--mono)', fontFeatureSettings:'"tnum"'}}>{idx.totalSupply.toFixed(2)}</td>
              <td className="idx-fee">{(idx.feeBps / 100).toFixed(1)}%</td>
              <td style={{fontFamily:'var(--mono)', fontWeight:600}}>{(balances[idx.symbol] || 0).toFixed(4)}</td>
              <td>
                <button className="btn primary" style={{fontSize:10, padding:'4px 12px'}}>
                  {mintIdx === idx.address ? 'Close' : 'Trade'}
                </button>
              </td>
            </tr>
            {mintIdx === idx.address && <tr><td colSpan="8" style={{padding:0, border:'none'}}>
              <div style={{border:'1px solid var(--ink)', padding:16, background:'rgba(94,121,178,.05)'}}>
                <div style={{fontFamily:'var(--display)', fontWeight:600, fontSize:14, marginBottom:4}}>{idx.name} ({idx.symbol})</div>
                <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-soft)', marginBottom:4}}>Creator: {idx.creator.slice(0,6)}...{idx.creator.slice(-4)}</div>
                <div style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-soft)', marginBottom:12, wordBreak:'break-all'}}>Contract: {idx.address}</div>
                <div style={{display:'flex', gap:8, alignItems:'center', marginBottom:8}}>
                  <label style={{fontFamily:'var(--mono)', fontSize:11}}>Amount:</label>
                  <input value={mintAmount} onChange={e => setMintAmount(e.target.value)} placeholder="1.0" style={{width:100, padding:'6px 10px', border:'1px solid var(--ink)', fontFamily:'var(--mono)', fontSize:13, background:'var(--paper)'}} />
                  <button className="btn primary" style={{fontSize:11, padding:'6px 16px'}} onClick={(e) => { e.stopPropagation(); handleBuy(idx); }} disabled={minting}>{minting ? 'Processing...' : 'Buy'}</button>
                  <button className="btn" style={{fontSize:11, padding:'6px 16px'}} onClick={(e) => { e.stopPropagation(); handleSell(idx); }} disabled={minting}>{minting ? 'Processing...' : 'Sell'}</button>
                </div>
                <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--ink-mute)'}}>Buy: the Atlas Vault provides the underlying stocks and mints index tokens for you in 1 transaction. Sell: burn your index tokens, stocks return to the vault.</div>
                {mintResult && <div style={{fontFamily:'var(--mono)', fontSize:11, marginTop:8, padding:'6px 10px', background: mintResult.ok ? 'rgba(0,180,0,.08)' : 'rgba(180,0,0,.08)', color: mintResult.ok ? 'var(--green)' : 'var(--red)'}}>{mintResult.msg}</div>}
              </div>
            </td></tr>}
          </React.Fragment>)}
        </tbody>
      </table>
    </> : <div style={{padding:'32px 0', textAlign:'center', color:'var(--dim)', fontSize:14}}>No indices deployed yet. Create your first index above!</div>}
  </>;
}

function StocksView({ wallet, balances, refreshBalances }) {
  const [selected, setSelected] = useState(null);
  const [amount, setAmount] = useState('1');
  const [toAddr, setToAddr] = useState('');
  const [busy, setBusy] = useState(false);
  const [result, setResult] = useState(null);

  const handleSend = async (stock) => {
    if (!wallet) { alert('Connect wallet first'); return; }
    if (!toAddr.trim() || !amount.trim()) return;
    setBusy(true); setResult(null);
    try {
      const contract = new ethers.Contract(stock.token, ERC20_ABI, wallet.signer);
      const decimals = await contract.decimals();
      const amt = ethers.parseUnits(amount, decimals);
      const tx = await contract.transfer(toAddr.trim(), amt);
      await tx.wait();
      if (refreshBalances) refreshBalances();
      setResult({ ok: true, msg: `Sent ${amount} ${stock.ticker} successfully!` });
    } catch (err) { setResult({ ok: false, msg: err.reason || err.message }); }
    setBusy(false);
  };

  return <>
    <div className="crumbs">
      <div className="path">Dashboard / <b>Stocks</b></div>
    </div>
    <div className="sec-title" style={{marginTop:18}}>
      <h2>Available Stocks</h2>
      <span className="ornament">&#10022; &#10022; &#10022;</span>
      <span className="right">{STOCKS.length} tokens on Robinhood Chain</span>

        if (s.live) {

            </div>
            <div className="sc-name">{s.name}</div>
            <div className="sc-price">${s.price.toFixed(2)}</div>
            <div className={`sc-change ${s.change >= 0 ? 'up' : 'dn'}`}>{s.change >= 0 ? '\u25b2' : '\u25bc'} {s.change > 0 ? '+' : ''}{s.change}%</div>
            <div style={{fontFamily:'var(--mono)', fontSize:10, marginTop:8, color:'var(--ink-soft)'}}>Balance: <b>{bal.toFixed(4)}</b></div>
            {isSelected && <div style={{marginTop:10, borderTop:'1px solid var(--rule)', paddingTop:10}} onClick={e => e.stopPropagation()}>
              <div style={{fontFamily:'var(--mono)', fontSize:10, marginBottom:6, color:'var(--ink-soft)'}}>Send {s.ticker} to address:</div>

              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <input value={amount} onChange={e => setAmount(e.target.value)} placeholder="Amount" style={{width:70, padding:'6px 8px', border:'1px solid var(--ink)', fontFamily:'var(--mono)', fontSize:11, background:'var(--paper)'}} />
                <button className="btn primary" style={{fontSize:10, padding:'5px 14px'}} onClick={() => handleSend(s)} disabled={busy}>{busy ? '...' : 'Send'}</button>

function TerminalView({ wallet, balances, refreshBalances }) {
  const walletStatus = wallet ? `Wallet: ${wallet.address.slice(0,6)}...${wallet.address.slice(-4)}` : 'Wallet: not connected (connect via sidebar)';
  const [messages, setMessages] = useState([
    { type:'system', text:'Atlas Terminal \u00b7 v0.1.0 \u00b7 Robinhood Chain Testnet' },
    { type:'system', text: walletStatus },
    { type:'spacer' },
    { type:'agent', text:'Welcome to Atlas. I can help you buy or sell tokenized stocks, create custom index funds, send tokens, or answer any questions. What would you like to do?' },
  ]);
  const [input, setInput] = useState('');
  const [isThinking, setIsThinking] = useState(false);
  const [chatHistory, setChatHistory] = useState([]);
  const [pendingConfirm, setPendingConfirm] = useState(null);
  const messagesEnd = useRef(null);
  const messagesArea = useRef(null);
  const wrapRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => { messagesEnd.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);
  useEffect(() => { inputRef.current?.focus(); }, []);

  // sync notebook lines with scroll
  useEffect(() => {
    const el = messagesArea.current;
    if (!el) return;
    const sync = () => {
      if (wrapRef.current) {
        const offset = -(el.scrollTop % 28) + 20;
        wrapRef.current.style.setProperty('--term-offset', offset + 'px');
      }
    };
    el.addEventListener('scroll', sync);
    sync();
    return () => el.removeEventListener('scroll', sync);
  }, []);

  const handleSend = async () => {
    if (!input.trim() || isThinking) return;
    const userInput = input.trim();
    setInput('');
    setMessages(prev => [...prev, { type:'user', text: userInput }]);
    setIsThinking(true);

    // Add to chat history
    const newHistory = [...chatHistory, { role: 'user', content: userInput }];
    setChatHistory(newHistory);

    // Show thinking
    setMessages(prev => [...prev, { type:'thinking', text:'Consulting the oracle...' }]);

    try {
      const parsed = await callAtlasAI(newHistory, balances);
      const confirm = buildConfirmation(parsed);

      // Add assistant reply to chat history
      setChatHistory(prev => [...prev, { role: 'assistant', content: parsed.reply || '' }]);

      if (confirm) {
        // Show preview + confirm buttons
        setPendingConfirm(confirm);
        setMessages(prev => {
          const without = prev.filter(m => m.type !== 'thinking');
          return [...without, ...confirm.preview, { type:'confirm' }];
        });
      } else {
        // No confirmation needed, show directly
        const resultMsgs = executeAction(parsed, balances);
        setMessages(prev => {
          const without = prev.filter(m => m.type !== 'thinking');
          return [...without, ...resultMsgs, { type:'spacer' }];
        });
      }
    } catch (err) {
      console.error('AI error:', err);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'thinking');
        return [...without, { type:'error', text: 'Connection error. Please try again.' }, { type:'spacer' }];
      });
    }
    setIsThinking(false);
  };

  const handleConfirm = async () => {
    if (!pendingConfirm) return;
    const { action: act, data: d } = pendingConfirm;

    // Check wallet connection for any on-chain action
    if (!wallet && (act === 'buy_index' || act === 'sell_index' || act === 'buy' || act === 'sell' || act === 'send' || act === 'create_index')) {
      setPendingConfirm(null);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'confirm');
        return [...without, { type:'error', text: 'Wallet not connected. Please connect your wallet using the sidebar button first, then try again.' }, { type:'spacer' }];
      });
      return;
    }

    // Real on-chain buy index via AtlasVault
    if (act === 'buy_index' && wallet && d?.index) {
      setPendingConfirm(null);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'confirm');
        return [...without, { type:'system', text: `Buying ${d.qty} ${d.index.symbol} via AtlasVault...` }];
      });
      try {
        const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
        const amount = ethers.parseEther(String(d.qty));
        const tx = await vault.buyIndex(d.index.address, amount);
        setMessages(prev => [...prev, { type:'system', text: `Tx submitted: ${tx.hash.slice(0,14)}...` }]);
        await tx.wait();
        if (refreshBalances) refreshBalances();
        const msgs = [{ type:'success', text: `\u2713 Bought ${d.qty} ${d.index.symbol} via AtlasVault! Tx: ${tx.hash.slice(0,14)}...` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      } catch (err) {
        const msgs = [{ type:'error', text: `Buy failed: ${err.reason || err.message}` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      }
    }

    // Real on-chain sell index via AtlasVault
    if (act === 'sell_index' && wallet && d?.index) {
      setPendingConfirm(null);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'confirm');
        return [...without, { type:'system', text: `Selling ${d.qty} ${d.index.symbol} via AtlasVault...` }];
      });
      try {
        const amount = ethers.parseEther(String(d.qty));
        // Approve index tokens to vault
        const indexContract = new ethers.Contract(d.index.address, ERC20_ABI, wallet.signer);
        const allowance = await indexContract.allowance(wallet.address, VAULT_ADDRESS);
        if (allowance < amount) {
          setMessages(prev => [...prev, { type:'system', text: 'Approving index tokens...' }]);
          const approveTx = await indexContract.approve(VAULT_ADDRESS, amount);
          await approveTx.wait();
        }
        const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
        const tx = await vault.sellIndex(d.index.address, amount);
        setMessages(prev => [...prev, { type:'system', text: `Tx submitted: ${tx.hash.slice(0,14)}...` }]);
        await tx.wait();
        if (refreshBalances) refreshBalances();
        const msgs = [{ type:'success', text: `\u2713 Sold ${d.qty} ${d.index.symbol}! Stocks returned to vault. Tx: ${tx.hash.slice(0,14)}...` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      } catch (err) {
        const msgs = [{ type:'error', text: `Sell failed: ${err.reason || err.message}` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      }
    }

    // Real on-chain send
    if (act === 'send' && wallet && d?.toAddress && d?.sendAmount && d?.sendToken) {
      const stock = STOCKS.find(s => s.ticker === d.sendToken.toUpperCase());
      if (stock && stock.token) {
        setPendingConfirm(null);
        setMessages(prev => {
          const without = prev.filter(m => m.type !== 'confirm');
          return [...without, { type:'system', text: 'Sending transaction to Robinhood Chain...' }];
        });
        try {
          const contract = new ethers.Contract(stock.token, ERC20_ABI, wallet.signer);
          const decimals = await contract.decimals();
          const amount = ethers.parseUnits(String(d.sendAmount), decimals);
          const tx = await contract.transfer(d.toAddress, amount);
          setMessages(prev => [...prev, { type:'system', text: `Tx submitted: ${tx.hash.slice(0,14)}...` }]);
          await tx.wait();
          if (refreshBalances) refreshBalances();
          const msgs = [{ type:'success', text: `\u2713 Transfer confirmed on-chain! Tx: ${tx.hash.slice(0,14)}...` }];
          setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
          setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
          return;
        } catch (err) {
          const msgs = [{ type:'error', text: `Transaction failed: ${err.reason || err.message || 'Unknown error'}` }];
          setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
          setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
          return;
        }
      }
    }

    // Real on-chain create index
    if (act === 'create_index' && wallet && d?.indexStocks?.length >= 2) {
      setPendingConfirm(null);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'confirm');
        return [...without, { type:'system', text: 'Deploying index token on Robinhood Chain...' }];
      });
      try {
        const stockAddrs = d.indexStocks.map(t => {
          const s = STOCKS.find(st => st.ticker === t.toUpperCase());
          return s?.token;
        }).filter(Boolean);
        if (stockAddrs.length < 2) throw new Error('Need at least 2 valid stock tickers');
        const equalW = Math.floor(10000 / stockAddrs.length);
        const weights = stockAddrs.map((_, i) => i === 0 ? 10000 - equalW * (stockAddrs.length - 1) : equalW);
        const factory = new ethers.Contract(FACTORY_ADDRESS, FACTORY_ABI, wallet.signer);
        const tx = await factory.createIndex(d.indexName, d.symbol || 'IDX', stockAddrs, weights, 30);
        setMessages(prev => [...prev, { type:'system', text: `Tx submitted: ${tx.hash.slice(0,14)}...` }]);
        const receipt = await tx.wait();
        const event = receipt.logs.find(l => { try { return factory.interface.parseLog(l)?.name === 'IndexCreated'; } catch { return false; } });
        const indexAddr = event ? factory.interface.parseLog(event).args[0] : '';
        await loadDeployedIndices(wallet.provider);
        if (refreshBalances) refreshBalances();
        const msgs = [
          { type:'success', text: `\u2713 Index "$${d.symbol}" deployed on Robinhood Chain!` },
          { type:'agent', text: `Contract: ${indexAddr}` },
        ];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      } catch (err) {
        const msgs = [{ type:'error', text: `Deploy failed: ${err.reason || err.message}` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      }
    }

    // Real on-chain buy via AtlasVault
    if (act === 'buy' && wallet && d?.stock?.token && d?.qty) {
      setPendingConfirm(null);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'confirm');
        return [...without, { type:'system', text: 'Buying via AtlasVault on Robinhood Chain...' }];
      });
      try {
        // Find index that contains this stock, or buy stock directly
        // For now: transfer stock from vault to user (vault.buyIndex not applicable for single stocks)
        // We do a direct ERC-20 transfer from the vault - but vault only does buyIndex/sellIndex
        // So for single stock "buy" we explain this is for indices
        const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
        // Check if there's a deployed index for this stock
        const relevantIdx = DEPLOYED_INDICES.find(idx => idx.stocks.includes(d.stock.ticker));
        if (relevantIdx) {
          const amount = ethers.parseEther(String(d.qty));
          const tx = await vault.buyIndex(relevantIdx.address, amount);
          setMessages(prev => [...prev, { type:'system', text: `Tx submitted: ${tx.hash.slice(0,14)}...` }]);
          await tx.wait();
          if (refreshBalances) refreshBalances();
          const msgs = [{ type:'success', text: `\u2713 Bought ${d.qty} ${relevantIdx.symbol} (includes ${d.stock.ticker}) via AtlasVault!` }];
          setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
          setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        } else {
          const msgs = [{ type:'agent', text: `No index fund contains ${d.stock.ticker} yet. Create one first in the Indices section, then you can buy it via the vault.` }];
          setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
          setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        }
        return;
      } catch (err) {
        const msgs = [{ type:'error', text: `Buy failed: ${err.reason || err.message}` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      }
    }

    // Real on-chain sell via AtlasVault
    if (act === 'sell' && wallet && d?.stock?.token && d?.qty) {
      setPendingConfirm(null);
      setMessages(prev => {
        const without = prev.filter(m => m.type !== 'confirm');
        return [...without, { type:'system', text: 'Selling via AtlasVault on Robinhood Chain...' }];
      });
      try {
        const relevantIdx = DEPLOYED_INDICES.find(idx => idx.stocks.includes(d.stock.ticker));
        if (relevantIdx) {
          const amount = ethers.parseEther(String(d.qty));
          const indexContract = new ethers.Contract(relevantIdx.address, ERC20_ABI, wallet.signer);
          const allowance = await indexContract.allowance(wallet.address, VAULT_ADDRESS);
          if (allowance < amount) {
            setMessages(prev => [...prev, { type:'system', text: 'Approving index tokens...' }]);
            const approveTx = await indexContract.approve(VAULT_ADDRESS, amount);
            await approveTx.wait();
          }
          const vault = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, wallet.signer);
          const tx = await vault.sellIndex(relevantIdx.address, amount);
          setMessages(prev => [...prev, { type:'system', text: `Tx submitted: ${tx.hash.slice(0,14)}...` }]);
          await tx.wait();
          if (refreshBalances) refreshBalances();
          const msgs = [{ type:'success', text: `\u2713 Sold ${d.qty} ${relevantIdx.symbol}! Stocks returned to vault.` }];
          setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
          setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        } else {
          const msgs = [{ type:'agent', text: `No index fund contains ${d.stock.ticker}. You can sell individual stocks via Send.` }];
          setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
          setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        }
        return;
      } catch (err) {
        const msgs = [{ type:'error', text: `Sell failed: ${err.reason || err.message}` }];
        setChatHistory(prev => [...prev, { role:'user', content:'Confirmed.' }, { role:'assistant', content: msgs.map(m=>m.text).join(' ') }]);
        setMessages(prev => [...prev, ...msgs, { type:'spacer' }]);
        return;
      }
    }

    // Fallback: non-chain confirmations
    const msgs = pendingConfirm.onConfirm;
    setPendingConfirm(null);
    setChatHistory(prev => [...prev, { role: 'user', content: 'Confirmed.' }, { role: 'assistant', content: msgs.map(m => m.text).join(' ') }]);
    setMessages(prev => {
      const without = prev.filter(m => m.type !== 'confirm');
      return [...without, ...msgs, { type:'spacer' }];
    });
  };

  const handleCancel = () => {
    if (!pendingConfirm) return;
    const msgs = pendingConfirm.onCancel;
    setPendingConfirm(null);
    setChatHistory(prev => [...prev, { role: 'user', content: 'Cancelled.' }, { role: 'assistant', content: msgs.map(m => m.text).join(' ') }]);
    setMessages(prev => {
      const without = prev.filter(m => m.type !== 'confirm');
      return [...without, ...msgs, { type:'spacer' }];
    });
  };

  const handleKey = (e) => { if (e.key === 'Enter') handleSend(); };

  const clearChat = () => {
    setChatHistory([]);
    setPendingConfirm(null);
    setMessages([
      { type:'system', text:'Atlas Terminal \u00b7 v0.1.0 \u00b7 Robinhood Chain Testnet' },
      { type:'agent', text:'Terminal cleared. How can I help you?' },
    ]);
  };

  return <>
    <div className="crumbs">
      <div className="path">Dashboard / <b>Terminal</b></div>
      <div className="actions">
        <button className="btn ghost" onClick={clearChat}>Clear</button>
      </div>
    </div>
    <div className="terminal-full" ref={wrapRef}>
      <div className="terminal-header">
        <div className="title"><span className="dot"/> Atlas Terminal &middot; AI Agent</div>
        <div className="info">Robinhood Chain &middot; Testnet &middot; AI Terminal &middot; &#10022;</div>
      </div>
      <div className="terminal-messages" ref={messagesArea}>
        {messages.map((m, i) => {
          if (m.type === 'spacer') return <div key={i} className="msg-spacer"/>;
          if (m.type === 'system') return <div key={i} className="system-msg">{m.text}</div>;
          if (m.type === 'user') return <div key={i} className="user-msg"><span className="prompt">&#10095; </span>{m.text}</div>;
          if (m.type === 'thinking') return <div key={i} className="thinking">{m.text}</div>;
          if (m.type === 'success') return <div key={i} className="success-msg">{m.text}</div>;
          if (m.type === 'error') return <div key={i} className="error-msg">{m.text}</div>;
          if (m.type === 'confirm') return <div key={i} className="confirm-wrap">
            <span className="confirm-label">Confirm transaction?</span>
            <button className="confirm-btn yes" onClick={handleConfirm}>Confirm</button>
            <button className="confirm-btn no" onClick={handleCancel}>Cancel</button>
          </div>;
          return <div key={i} className="agent-msg">{m.text}</div>;
        })}
        <div ref={messagesEnd}/>
      </div>
      <div className="terminal-input-wrap">
        <span className="prompt-char">&#10095;</span>
        <input ref={inputRef} className="terminal-input" value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey} placeholder={pendingConfirm ? 'Confirm or cancel the transaction above' : 'Ask me anything... "buy TSLA", "create an index", "what is ATLAS?"'} disabled={isThinking || !!pendingConfirm} />
        <button className="terminal-send" onClick={handleSend} disabled={isThinking || !!pendingConfirm}>{isThinking ? '...' : 'Send'}</button>
      </div>
    </div>
  </>;
}
